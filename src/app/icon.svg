<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    🧭 BREADCRUMB: Browser Tab Favicon
    📍 LOCATION: src/app/icon.svg

    🎯 WHY IT EXISTS: Gives the public portfolio a recognizable browser-tab identity.
    🎯 USE CASES:
      - Chrome/Safari/Edge tab icon.
      - Static export route generated by Next.js.

    🔄 FLOW: SVG asset -> Next.js app icon route -> browser favicon
    🔗 USED BY: Next.js App Router metadata convention
    ⚠️ DEPENDS ON: Dark + amber visual identity from SPEC-001

    🚨 CAREFUL: Keep the mark readable at tiny sizes; avoid detailed illustrations.
    📊 PERFORMANCE: Tiny inline SVG asset.

    💾 MEMORIES: Public-safe SPEC context only; no private memory IDs.
    🐛 KNOWN BUGS: Browser favicon cache can delay visible updates.
    📋 SPEC: SPEC-001-curriculum-portfolio-landing
  -->
  <rect width="64" height="64" rx="14" fill="#050505"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#f59e0b" stroke-width="4"/>
  <text
    x="32"
    y="38"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="19"
    font-weight="700"
    letter-spacing="0"
    fill="#f8fafc"
  >RG</text>
</svg>
